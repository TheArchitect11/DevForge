name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./... -v -race -count=1

      - name: Vet
        run: go vet ./...

  build:
    name: Build ${{ matrix.binary }} ${{ matrix.os }}/${{ matrix.arch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary: [cli, agent, server]
        include:
          - binary: cli
            path: "."
            output: devforge
          - binary: agent
            path: "./cmd/agent"
            output: devforge-agent
          - binary: server
            path: "./cmd/server"
            output: devforge-server
        os: [darwin, linux, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o ${{ matrix.output }}-${{ matrix.os }}-${{ matrix.arch }}${EXT} \
            ${{ matrix.path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.output }}-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum devforge-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/devforge-*
            artifacts/checksums.txt
